<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 모바일 웹앱 설정 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>히라가나 연습</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .hiragana {
            font-size: 80px;
            margin: 20px 0;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .input-area {
            margin: 20px 0;
        }
        input {
            font-size: 20px;
            padding: 10px;
            width: 200px;
            border: 2px solid #ddd;
            border-radius: 5px;
            text-align: center;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
        /* 모바일에서 input 포커스 시 확대 방지 */
        @media screen and (max-width: 768px) {
            input {
                font-size: 16px; /* iOS에서 자동 확대 방지를 위한 최소 폰트 크기 */
            }
        }
        .result {
            font-size: 18px;
            margin: 10px 0;
            height: 25px;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        .stat-item {
            font-size: 16px;
            color: #333;
        }
        .round-info {
            font-size: 18px;
            color: #2196F3;
            margin: 10px 0;
            font-weight: bold;
        }
        .progress-container {
            width: 100%;
            height: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.3s ease;
        }
        .correct {
            color: #4CAF50;
        }
        .incorrect {
            color: #f44336;
        }
        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        .message {
            font-size: 16px;
            color: #2196F3;
            margin: 10px 0;
            padding: 10px;
            background-color: #e3f2fd;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>히라가나 연습</h1>
        <div class="round-info" id="roundInfo">전체 단어 학습</div>
        <div class="stats">
            <div class="stat-item">진행: <span id="progressText">0/0</span></div>
            <div class="stat-item">정답률: <span id="accuracyText">100%</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="message" id="message"></div>
        <div class="hiragana" id="hiragana"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="한글 발음 입력" autocomplete="off">
        </div>
        <div class="result" id="result"></div>
        <p class="hint">발음을 입력하고 Enter를 누르세요</p>
    </div>

    <script>
        const hiraganaDict = {
            'あ': '아', 'い': '이', 'う': '우', 'え': '에', 'お': '오',
            'か': '카', 'き': '키', 'く': '쿠', 'け': '케', 'こ': '코',
            'さ': '사', 'し': '시', 'す': '스', 'せ': '세', 'そ': '소',
            'た': '타', 'ち': '치', 'つ': '츠', 'て': '테', 'と': '토',
            'な': '나', 'に': '니', 'ぬ': '누', 'ね': '네', 'の': '노',
            'は': '하', 'ひ': '히', 'ふ': '후', 'へ': '헤', 'ほ': '호',
            'ま': '마', 'み': '미', 'む': '무', 'め': '메', 'も': '모',
            'や': '야', 'ゆ': '유', 'よ': '요',
            'ら': '라', 'り': '리', 'る': '루', 'れ': '레', 'ろ': '로',
            'わ': '와', 'を': '오', 'ん': '응'
        };

        let currentHiragana = '';
        let currentRound = 1;
        let answeredCount = 0;
        let correctCount = 0;
        let isProcessing = false;
        let remainingWords = [];
        let incorrectWords = new Set();

        const hiraganaElement = document.getElementById('hiragana');
        const userInput = document.getElementById('userInput');
        const resultElement = document.getElementById('result');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const accuracyText = document.getElementById('accuracyText');
        const roundInfo = document.getElementById('roundInfo');
        const messageElement = document.getElementById('message');

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function updateStats() {
            const totalWords = remainingWords.length + answeredCount;
            const progress = (answeredCount / totalWords) * 100;
            const accuracy = (correctCount / answeredCount) * 100 || 100;
            
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `${answeredCount}/${totalWords}`;
            accuracyText.textContent = `${accuracy.toFixed(1)}%`;
        }

        function startNewRound() {
            if (incorrectWords.size === 0) {
                hiraganaElement.textContent = "모든 학습 완료!";
                messageElement.style.display = 'block';
                messageElement.textContent = "축하합니다! 모든 히라가나를 학습했습니다!";
                return;
            }

            currentRound++;
            remainingWords = shuffleArray([...incorrectWords]);
            incorrectWords.clear();
            answeredCount = 0;
            correctCount = 0;
            
            roundInfo.textContent = `오답 학습 - ${currentRound}라운드`;
            messageElement.style.display = 'block';
            messageElement.textContent = `틀린 ${remainingWords.length}개의 단어를 다시 학습합니다.`;
            
            showNextHiragana();
            updateStats();
        }

        function showNextHiragana() {
            if (remainingWords.length === 0) {
                if (incorrectWords.size > 0) {
                    setTimeout(() => {
                        startNewRound();
                    }, 1500);
                } else {
                    startNewRound();
                }
                return;
            }

            currentHiragana = remainingWords.pop();
            hiraganaElement.textContent = currentHiragana;
            userInput.value = '';
            resultElement.textContent = '';
            userInput.focus();
            isProcessing = false;
            messageElement.style.display = 'none';
        }

        function checkAnswer() {
            if (isProcessing) return;
            isProcessing = true;

            const userAnswer = userInput.value.trim();
            const correctAnswer = hiraganaDict[currentHiragana];

            answeredCount++;
            
            if (userAnswer === correctAnswer) {
                resultElement.textContent = '정답입니다!';
                resultElement.className = 'result correct';
                correctCount++;
            } else {
                resultElement.textContent = `틀렸습니다. 정답은 '${correctAnswer}'입니다.`;
                resultElement.className = 'result incorrect';
                incorrectWords.add(currentHiragana);
            }

            updateStats();
 

            setTimeout(() => {
                userInput.disabled = false;
                showNextHiragana();
                userInput.focus(); // 다음 문제로 넘어갈 때 자동 포커스
            }, 1500);
        }

        userInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter' && !isProcessing) {
                checkAnswer();
            }
        });

        // 초기화
        remainingWords = shuffleArray(Object.keys(hiraganaDict));
        showNextHiragana();
        updateStats();
    </script>
</body>
</html>
